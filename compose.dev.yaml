# Dev-mode overlay: adds TimescaleDB and EMQX so the stack can run on a clean host.
# Usage:  docker compose -f compose.yaml -f compose.dev.yaml up --build
#
# This file is for local development only. Production stacks should point at
# external managed Postgres / EMQX services.

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb_dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME:-ssl}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-changeme}
      - POSTGRES_DB=${DATABASE_NAME:-ssl}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-ssl} -d ${DATABASE_NAME:-ssl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  emqx:
    image: emqx/emqx:5.8
    container_name: emqx_dev
    restart: unless-stopped
    environment:
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=changeme
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # MQTT over WebSocket
      - "8084:8084"   # MQTT over WSS
      - "8883:8883"   # MQTT over TLS
      - "18083:18083" # Management dashboard
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status | grep -q 'is started'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webapp:
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy

  databridge-esp:
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy

  databridge-zigbee:
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy

  databridge-sensibo:
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
