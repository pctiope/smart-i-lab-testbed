name: Zone 5 Compose CI/CD

on:
  push:
    branches: [cicd/zone5-compose]
    paths:
      - .github/workflows/zone5-compose-ci-cd.yml
      - CSV Training Data Code.py
      - dataloader.py
      - api_ingestion.py
      - bronze2silver_preprocess.py
      - silver2gold_preprocess.py
      - zone5_training_migrated.py
      - train_zone5_migrated.py
      - bsg_retrain_once.py
      - seed_zone5_live_support_tables.py
      - smoke_train_runtime.py
      - requirements.txt
      - Dockerfile.bsg
      - compose.zone5-bsg.yaml
      - run_bsg_live_collector.sh
      - run_bsg_trainer.sh
      - docker/**
      - TEST/**
      - zone5_cv_time_features_package/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zone5-compose-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Validate Zone 5 Compose branch
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: zone5_cv_time_features_package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            zone5_cv_time_features_package/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install -r requirements.txt

      - name: Install BSG Python dependencies
        working-directory: .
        run: python -m pip install -r requirements.txt

      - name: Compile BSG modules
        working-directory: .
        run: python -m py_compile "CSV Training Data Code.py" dataloader.py zone5_training_migrated.py train_zone5_migrated.py bsg_retrain_once.py seed_zone5_live_support_tables.py smoke_train_runtime.py api_ingestion.py bronze2silver_preprocess.py silver2gold_preprocess.py

      - name: Run BSG migration tests
        working-directory: .
        run: |
          python -m unittest TEST.test_training_migrated -v
          python -m unittest TEST.test_train -v
          python -m unittest TEST.test_pipeline -v
          python -m unittest TEST.test_bsg_retrain_once -v

      - name: Compile Python modules
        run: python -m compileall zone5 web_app ci smoke_test.py

      - name: Run Zone 5 ground-truth tests
        run: PYTHONPATH=. python tests/test_cv_ground_truth.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zone5_cv_time_features_package/web_app_vite/smart-ilab-zone5/package-lock.json

      - name: Install Vite dependencies
        working-directory: zone5_cv_time_features_package/web_app_vite/smart-ilab-zone5
        run: npm ci

      - name: Build Vite frontend
        working-directory: zone5_cv_time_features_package/web_app_vite/smart-ilab-zone5
        run: npm run build

      - name: Verify checked-in user units
        run: systemd-analyze verify systemd/user/*.service systemd/user/*.timer

      - name: Create CI-only runtime env files
        run: |
          touch web_app/.env
          touch web_app_vite/smart-ilab-zone5/.env

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Build Docker Compose images
        run: docker compose build

      - name: Validate BSG Docker Compose config
        working-directory: .
        run: docker compose -f compose.zone5-bsg.yaml --profile ops config --quiet

      - name: Build BSG Docker Compose images
        working-directory: .
        run: docker compose -f compose.zone5-bsg.yaml --profile ops build bsg-ingestion bsg-trainer live-app

  deploy:
    name: Deploy staging Compose stack
    runs-on: [self-hosted, linux, x64, zone5, smart-ilab]
    timeout-minutes: 30
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/cicd/zone5-compose'
    env:
      DEPLOY_BRANCH: cicd/zone5-compose
      REPO_URL: https://github.com/${{ github.repository }}.git

    steps:
      - name: Deploy local staging stack
        run: |
          set -euo pipefail

          DEPLOY_ROOT="${DEPLOY_ROOT:-$HOME/smart-i-lab-testbed-compose}"
          PROD_ROOT="${PROD_ROOT:-$HOME/smart-i-lab-testbed/zone5_cv_time_features_package}"
          PKG_ROOT="$DEPLOY_ROOT/zone5_cv_time_features_package"

          if [ -e "$DEPLOY_ROOT" ] && [ ! -d "$DEPLOY_ROOT/.git" ]; then
            echo "$DEPLOY_ROOT exists but is not a Git checkout; refusing to overwrite it." >&2
            exit 1
          fi

          if [ ! -d "$DEPLOY_ROOT/.git" ]; then
            git clone --branch "$DEPLOY_BRANCH" --single-branch "$REPO_URL" "$DEPLOY_ROOT"
          fi

          git -C "$DEPLOY_ROOT" remote set-url origin "$REPO_URL"
          git -C "$DEPLOY_ROOT" fetch --prune origin "$DEPLOY_BRANCH"
          git -C "$DEPLOY_ROOT" checkout -B "$DEPLOY_BRANCH" FETCH_HEAD

          if [ -n "${DEPLOY_SHA:-}" ]; then
            current_sha="$(git -C "$DEPLOY_ROOT" rev-parse HEAD)"
            if [ "$current_sha" != "$DEPLOY_SHA" ]; then
              echo "Deployed ref $current_sha does not match workflow SHA $DEPLOY_SHA." >&2
              exit 1
            fi
          fi

          install -d "$DEPLOY_ROOT/data" "$DEPLOY_ROOT/logs" "$DEPLOY_ROOT/stage"
          install -d "$PKG_ROOT/data" "$PKG_ROOT/model" "$PKG_ROOT/logs"

          umask 077
          for env_path in "$DEPLOY_ROOT/.env" "$PKG_ROOT/.env"; do
            cat > "$env_path" <<EOF
          ZONE5_UID=$(id -u)
          ZONE5_GID=$(id -g)
          ZONE5_APP_PORT=8005
          ZONE5_VITE_PORT=8016
          ZONE5_COMPOSE_PROJECT_NAME=zone5-compose
          ZONE5_BSG_COMPOSE_PROJECT_NAME=zone5-compose
          EOF
          done

          if [ ! -f "$PKG_ROOT/web_app/.env" ]; then
            if [ ! -f "$PROD_ROOT/web_app/.env" ]; then
              echo "Missing production backend env at $PROD_ROOT/web_app/.env." >&2
              exit 1
            fi
            install -m 600 "$PROD_ROOT/web_app/.env" "$PKG_ROOT/web_app/.env"
          fi

          if [ ! -f "$PKG_ROOT/model/production_run.txt" ]; then
            if [ ! -f "$PROD_ROOT/model/production_run.txt" ]; then
              echo "Missing production model pointer at $PROD_ROOT/model/production_run.txt." >&2
              exit 1
            fi
            pointer_rel="$(cat "$PROD_ROOT/model/production_run.txt")"
            case "$pointer_rel" in
              model/runs/*) ;;
              *)
                echo "Unexpected production model pointer: $pointer_rel" >&2
                exit 1
                ;;
            esac
            run_id="${pointer_rel#model/runs/}"
            if [ ! -d "$PROD_ROOT/model/runs/$run_id" ]; then
              echo "Missing production model run at $PROD_ROOT/model/runs/$run_id." >&2
              exit 1
            fi
            install -d "$PKG_ROOT/model/runs"
            if [ ! -d "$PKG_ROOT/model/runs/$run_id" ]; then
              cp -a "$PROD_ROOT/model/runs/$run_id" "$PKG_ROOT/model/runs/"
            fi
            printf '%s\n' "$pointer_rel" > "$PKG_ROOT/model/production_run.txt"
          fi

          python3 - "$PROD_ROOT/web_app_vite/smart-ilab-zone5/.env" "$PROD_ROOT/web_app/.env" "$PKG_ROOT/web_app_vite/smart-ilab-zone5/.env" "$DEPLOY_ROOT/.env" <<'PY'
          import pathlib
          import sys

          prod_vite = pathlib.Path(sys.argv[1])
          prod_backend = pathlib.Path(sys.argv[2])
          stage_vite = pathlib.Path(sys.argv[3])
          root_env = pathlib.Path(sys.argv[4])

          def read_env(path):
              values = {}
              if not path.exists():
                  return values
              for raw_line in path.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip()
                  value = value.strip().strip("'").strip('"')
                  values[key] = value
              return values

          vite_values = read_env(prod_vite)
          backend_values = read_env(prod_backend)
          api_key = (
              backend_values.get("SMART_ILAB_API_KEY")
              or backend_values.get("AIR1_API_KEY")
              or vite_values.get("VITE_API_KEY")
          )
          ilab_url = vite_values.get("VITE_ILAB_API_URL")
          bsg_base_url = (
              backend_values.get("SMART_ILAB_BASE_URL")
              or backend_values.get("AIR1_API_URL")
              or ilab_url
          )

          missing = []
          if not api_key:
              missing.append("SMART_ILAB_API_KEY/AIR1_API_KEY/VITE_API_KEY")
          if not ilab_url:
              missing.append("VITE_ILAB_API_URL")
          if not bsg_base_url:
              missing.append("SMART_ILAB_BASE_URL/AIR1_API_URL")
          if missing:
              joined = ", ".join(missing)
              raise SystemExit(f"Missing production Vite env value(s): {joined}")

          def quote(value):
              return '"' + value.replace("\\", "\\\\").replace('"', '\\"') + '"'

          stage_vite.parent.mkdir(parents=True, exist_ok=True)
          tmp_path = stage_vite.with_suffix(stage_vite.suffix + ".tmp")
          tmp_path.write_text(
              "\n".join(
                  [
                      f"VITE_API_KEY={quote(api_key)}",
                      'VITE_INFERENCE_API_URL="http://live-app:8000"',
                      f"VITE_ILAB_API_URL={quote(ilab_url)}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          tmp_path.chmod(0o600)
          tmp_path.replace(stage_vite)

          with root_env.open("a", encoding="utf-8") as handle:
              handle.write(f"SMART_ILAB_BASE_URL={quote(bsg_base_url)}\n")
              handle.write(f"SMART_ILAB_API_KEY={quote(api_key)}\n")
          PY

          cd "$DEPLOY_ROOT"
          docker compose -f compose.zone5-bsg.yaml config --quiet
          docker compose -f compose.zone5-bsg.yaml up -d --build --remove-orphans live-app vite-frontend bsg-ingestion
          docker compose -f compose.zone5-bsg.yaml ps
          for service in bsg-ingestion live-app vite-frontend; do
            if ! docker compose -f compose.zone5-bsg.yaml ps --services --status running | grep -qx "$service"; then
              echo "Compose service is not running: $service" >&2
              docker compose -f compose.zone5-bsg.yaml ps >&2
              exit 1
            fi
          done

          health_json="$(curl --noproxy '*' -fsS http://127.0.0.1:8005/api/health)"
          python3 - "$health_json" <<'PY'
          import json
          import sys

          health = json.loads(sys.argv[1])
          model_run_id = (health.get("inference") or {}).get("model_run_id")
          if not health.get("ok") or not model_run_id:
              raise SystemExit("staging backend is missing ok health or model_run_id")
          PY
          curl --noproxy '*' -fsS http://127.0.0.1:8016/ >/dev/null
          curl --noproxy '*' -fsS http://127.0.0.1:8016/api/health >/dev/null
